<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#cbe8e6",
              "surface-container-highest": "#dde4e1",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed": "#294443",
              "primary": "#426564",
              "error-container": "#fa746f",
              "background": "#f8faf8",
              "on-background": "#2d3432",
              "on-tertiary": "#fff7f3",
              "surface-bright": "#f8faf8",
              "tertiary-container": "#fde7d3",
              "on-tertiary-container": "#635445",
              "outline": "#757c7a",
              "on-secondary": "#e1fffd",
              "on-tertiary-fixed": "#504234",
              "secondary": "#496463",
              "on-primary-fixed-variant": "#3e6261",
              "primary-container": "#c4eae8",
              "inverse-on-surface": "#9b9d9c",
              "on-surface": "#2d3432",
              "surface-container": "#eaefec",
              "tertiary-fixed": "#fde7d3",
              "primary-fixed": "#c4eae8",
              "on-tertiary-fixed-variant": "#6d5e4f",
              "error": "#a83836",
              "inverse-surface": "#0b0f0e",
              "surface-container-low": "#f1f4f2",
              "primary-fixed-dim": "#b6dcda",
              "on-secondary-fixed-variant": "#45605f",
              "on-error": "#fff7f6",
              "on-error-container": "#6e0a12",
              "surface-dim": "#d4dcd9",
              "secondary-container": "#cbe8e6",
              "on-surface-variant": "#59615f",
              "tertiary-dim": "#5f5142",
              "on-primary": "#e0fffe",
              "error-dim": "#67040d",
              "tertiary": "#6c5c4d",
              "surface-container-high": "#e4e9e7",
              "on-primary-container": "#345857",
              "surface-tint": "#426564",
              "on-primary-fixed": "#214544",
              "surface-variant": "#dde4e1",
              "on-secondary-container": "#3c5755",
              "surface": "#f8faf8",
              "inverse-primary": "#d7fefc",
              "secondary-dim": "#3d5857",
              "outline-variant": "#acb3b1",
              "tertiary-fixed-dim": "#eed9c6",
              "secondary-fixed-dim": "#bddad8",
              "primary-dim": "#365958"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neomorph-tile {
            box-shadow: 8px 8px 16px rgba(0,0,0,0.08), -8px -8px 16px rgba(255,255,255,0.9);
        }
        .neomorph-tile-inset {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.1), inset -4px -4px 8px rgba(255,255,255,0.8);
        }
        .neomorph-error {
            box-shadow: 0 0 15px rgba(250, 116, 111, 0.4), inset 4px 4px 8px rgba(0,0,0,0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface docked full-width px-4 pt-2 shadow-[4px_4px_10px_rgba(0,0,0,0.05),-4px_-4px_10px_rgba(255,255,255,0.8)] z-50">
<div class="flex justify-between items-center w-full max-w-2xl mx-auto h-16">
<button class="hover:bg-surface-container-high transition-all p-2 rounded-full scale-95 active:duration-150">
<span class="material-symbols-outlined text-primary text-[28px]">menu</span>
</button>
<h1 class="font-manrope text-headline-md font-semibold text-primary tracking-wide">舒尔特方格</h1>
<button class="hover:bg-surface-container-high transition-all p-2 rounded-full scale-95 active:duration-150">
<span class="material-symbols-outlined text-primary text-[28px]">settings</span>
</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center px-6 pt-12 max-w-2xl mx-auto w-full">
<!-- Game Header / Stats Section -->
<section class="w-full flex flex-col mb-12">
<div class="flex justify-between items-end mb-8">
<div class="flex flex-col">
<span class="font-label text-label-md tracking-widest text-on-surface-variant uppercase mb-1">Current Level</span>
<h2 class="font-headline text-headline-md font-medium text-primary">第一关</h2>
</div>
<div class="flex gap-6">
<div class="flex flex-col items-end">
<span class="font-label text-label-md tracking-widest text-on-surface-variant uppercase mb-1">Time</span>
<span class="font-headline text-title-lg font-bold text-on-surface tracking-tighter">00:12:45</span>
</div>
<div class="flex flex-col items-end">
<span class="font-label text-label-md tracking-widest text-on-surface-variant uppercase mb-1">Errors</span>
<span class="font-headline text-title-lg font-bold text-error tracking-tighter">0</span>
</div>
</div>
</div>
<!-- Focus Target (The Mindful Monolith) -->
<div class="bg-surface-container-low rounded-[2rem] p-8 flex flex-col items-center justify-center relative overflow-hidden shadow-inner">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16"></div>
<span class="font-label text-label-md tracking-[0.2rem] text-primary/60 uppercase mb-2">Target</span>
<div class="flex items-baseline gap-2">
<span class="font-headline text-display-lg font-extrabold text-primary leading-none">4</span>
<span class="font-headline text-headline-sm font-medium text-on-surface-variant">请点击: 4</span>
</div>
</div>
</section>
<!-- Schulte Grid Canvas -->
<div class="w-full bg-surface-container-low p-6 rounded-[2.5rem] shadow-[inset_10px_10px_20px_rgba(0,0,0,0.02),inset_-10px_-10px_20px_rgba(255,255,255,0.7)]">
<div class="grid grid-cols-3 gap-5 md:gap-8">
<!-- Row 1 -->
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">7</span>
</button>
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">2</span>
</button>
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">9</span>
</button>
<!-- Row 2 -->
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">5</span>
</button>
<!-- Pressed State (The Target) -->
<button class="neomorph-tile-inset aspect-square bg-primary rounded-3xl flex items-center justify-center scale-95 shadow-inner">
<span class="font-headline text-headline-lg font-bold text-on-primary">4</span>
</button>
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">1</span>
</button>
<!-- Row 3 -->
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">8</span>
</button>
<!-- Error State (Subtle red glow) -->
<button class="neomorph-error aspect-square bg-error-container rounded-3xl flex items-center justify-center">
<span class="font-headline text-headline-lg font-medium text-on-error-container">10</span>
</button>
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300">
<span class="font-headline text-headline-lg font-medium text-on-surface">3</span>
</button>
<!-- Row 4 (Centering for Grid) -->
<div class="col-start-2">
<button class="neomorph-tile aspect-square bg-surface-container-highest rounded-3xl flex items-center justify-center hover:scale-105 transition-transform duration-300 w-full">
<span class="font-headline text-headline-lg font-medium text-on-surface">6</span>
</button>
</div>
</div>
</div>
<!-- Utility Actions -->
<div class="flex gap-4 mt-12 mb-24">
<button class="flex items-center gap-2 bg-secondary-container text-on-secondary-container px-6 py-3 rounded-xl font-headline font-semibold hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined">pause</span>
                暂停
            </button>
<button class="flex items-center gap-2 bg-primary text-on-primary px-8 py-3 rounded-full font-headline font-semibold shadow-lg hover:brightness-110 transition-all scale-105">
<span class="material-symbols-outlined">refresh</span>
                重开
            </button>
</div>
</main>
<!-- BottomNavBar (Mobile Shell) -->
<nav class="fixed bottom-0 left-0 right-0 z-50 md:hidden">
<div class="bg-surface-container-low/70 backdrop-blur-xl flex justify-around items-center w-full mx-auto max-w-sm mb-8 rounded-[2rem] py-3 shadow-[8px_8px_16px_rgba(0,0,0,0.08),-8px_-8px_16px_rgba(255,255,255,0.9)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 px-5 py-2 hover:scale-110 transition-transform duration-300" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-manrope text-[10px] font-medium tracking-widest uppercase mt-1">首页</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-2xl px-5 py-2 scale-105 shadow-inner" href="#">
<span class="material-symbols-outlined" data-icon="grid_view" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-manrope text-[10px] font-medium tracking-widest uppercase mt-1">挑战</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-70 px-5 py-2 hover:scale-110 transition-transform duration-300" href="#">
<span class="material-symbols-outlined" data-icon="emoji_events">emoji_events</span>
<span class="font-manrope text-[10px] font-medium tracking-widest uppercase mt-1">成就</span>
</a>
</div>
</nav>
<!-- Web Floating Desktop Nav -->
<nav class="hidden md:flex fixed right-8 top-1/2 -translate-y-1/2 flex-col gap-6 bg-surface-container-low p-4 rounded-3xl shadow-xl">
<button class="p-3 bg-primary text-on-primary rounded-2xl shadow-md">
<span class="material-symbols-outlined">grid_view</span>
</button>
<button class="p-3 text-primary hover:bg-surface-container-high rounded-2xl transition-colors">
<span class="material-symbols-outlined">emoji_events</span>
</button>
<button class="p-3 text-primary hover:bg-surface-container-high rounded-2xl transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</nav>
</body></html>
